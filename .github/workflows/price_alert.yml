name: Price Alert

on:
  schedule:
    # ลูกค้าขอ "ครั้งเดียวตอนตลาดปิด" (ดูราคาล่าสุดพอ) — รอบเดียว 21:05 UTC (= TWN 05:05)
    #   ฤดูหนาว EST: ตลาดปิด 21:00 UTC → เช็ค 5 นาทีหลังปิด (ราคาปิดพอดี)
    #   ฤดูร้อน EDT: ตลาดปิด 20:00 UTC → เช็ค ~1h หลังปิด (ราคาล่าสุดหลังปิด ใกล้เคียงราคาปิด)
    - cron: '5 21 * * 1-5'
  workflow_dispatch:

jobs:
  price-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run price alert
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BOT_DEFAULT_TENANT_ID: 3da82a79-8ef5-4f8c-9df3-faed33e75b64
        run: python scripts/price_alert.py
