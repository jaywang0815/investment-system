name: Price Alert

on:
  schedule:
    # ทุก 1 ชั่วโมงช่วงตลาด US เปิด (Mon-Fri) — เวลาไทย ~22:00-05:00
    # UTC: 15:00, 16:00, 17:00, 18:00, 19:00, 20:00, 21:00
    - cron: '0 15,16,17,18,19,20,21 * * 1-5'
  workflow_dispatch:  # รันมือได้ตลอดเวลา

jobs:
  price-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run price alert
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python scripts/price_alert.py
