name: Price Alert

on:
  schedule:
    # ตรวจ 2–3 ครั้ง/วัน รองรับ US DST (Taiwan ไม่มี DST)
    #
    # [1] หลังตลาดเปิด — TWN 23:00 (ห้าทุ่ม) ทุกฤดู
    #     ฤดูร้อน EDT: ตลาดเปิด 21:30 → เช็ค 1.5h หลังเปิด
    #     ฤดูหนาว EST: ตลาดเปิด 22:30 → เช็ค 0.5h หลังเปิด
    - cron: '0 15 * * 1-5'
    #
    # [2] หลังตลาดปิด ฤดูร้อน EDT — TWN 04:05
    #     ตลาดปิด 04:00 TWN → เช็ค 5 นาทีหลังปิด
    - cron: '5 20 * * 1-5'
    #
    # [3] หลังตลาดปิด ฤดูหนาว EST — TWN 05:05
    #     ตลาดปิด 05:00 TWN → เช็ค 5 นาทีหลังปิด
    - cron: '5 21 * * 1-5'
  workflow_dispatch:

jobs:
  price-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run price alert
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/price_alert.py
