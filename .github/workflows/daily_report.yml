name: 每日LINE報告

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC = 08:00 台灣時間
  workflow_dispatch:      # 允許手動觸發

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install supabase requests yfinance

      - name: 發送每日報告
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_ADMIN_USER_ID: ${{ secrets.LINE_ADMIN_USER_ID }}
        run: python scripts/send_daily_report.py
