services:
  - type: web
    name: investment-line-bot
    runtime: python
    buildCommand: pip install -r requirements-bot.txt
    startCommand: uvicorn line_bot_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

  # 後台管理系統 (Streamlit) — 供 app.justinvestment.co 使用
  - type: web
    name: investment-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/render_secrets.py && streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      # 在 Render 後台貼上整份 .streamlit/secrets.toml 內容
      - key: STREAMLIT_SECRETS_TOML
        sync: false

# auto-deploy webhook test — build-marker-1
